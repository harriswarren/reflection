<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>sensai-webxr-worldmodels</title>
  </head>
  <body style="margin: 0">
    <div id="scene-container" style="background:#000"></div>
    <div id="state-buttons" style="position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:1000;pointer-events:auto">
      <button type="button" data-state="reflection" style="padding:8px 14px;border-radius:8px;border:1px solid #555;background:#222;color:#eee;cursor:pointer;font-size:14px">Reflection</button>
      <button type="button" data-state="defensiveness" style="padding:8px 14px;border-radius:8px;border:1px solid #555;background:#222;color:#eee;cursor:pointer;font-size:14px">Defensiveness</button>
      <button type="button" data-state="curiosity" style="padding:8px 14px;border-radius:8px;border:1px solid #555;background:#222;color:#eee;cursor:pointer;font-size:14px">Curiosity</button>
      <button type="button" data-state="stress" style="padding:8px 14px;border-radius:8px;border:1px solid #555;background:#222;color:#eee;cursor:pointer;font-size:14px">Stress</button>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
