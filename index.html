<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>sensai-webxr-worldmodels</title>
  </head>
  <body style="margin: 0">
    <div id="scene-container" style="background:#000"></div>
    <div id="voice-status" style="position:fixed;top:12px;left:12px;z-index:1001;pointer-events:none;font-family:sans-serif;max-width:500px">
      <div style="display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.75);padding:8px 14px;border-radius:8px">
        <span id="status-dot" style="width:12px;height:12px;border-radius:50%;background:#aaa;display:inline-block;flex-shrink:0"></span>
        <span id="status-label" style="color:#eee;font-size:14px">Starting mic...</span>
      </div>
      <div id="status-model-text" style="color:#88bbff;font-size:12px;margin-top:4px;padding:0 14px;word-wrap:break-word"></div>
      <div id="status-transcript" style="color:#88ff88;font-size:12px;margin-top:2px;padding:0 14px;word-wrap:break-word"></div>
      <div id="status-emotion" style="color:#fbbf24;font-size:13px;font-weight:bold;margin-top:2px;padding:0 14px"></div>
    </div>
    <div id="state-buttons" style="position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:1000;pointer-events:auto">
      <button type="button" data-state="reflection" style="padding:8px 14px;border-radius:8px;border:1px solid #555;background:#222;color:#eee;cursor:pointer;font-size:14px">Reflection</button>
      <button type="button" data-state="defensiveness" style="padding:8px 14px;border-radius:8px;border:1px solid #555;background:#222;color:#eee;cursor:pointer;font-size:14px">Defensiveness</button>
      <button type="button" data-state="curiosity" style="padding:8px 14px;border-radius:8px;border:1px solid #555;background:#222;color:#eee;cursor:pointer;font-size:14px">Curiosity</button>
      <button type="button" data-state="stress" style="padding:8px 14px;border-radius:8px;border:1px solid #555;background:#222;color:#eee;cursor:pointer;font-size:14px">Stress</button>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
